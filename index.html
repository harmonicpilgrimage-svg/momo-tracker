<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/static/manifest.json">
<title>MoMo Tracker</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--radius:12px}
.sr-only{position:absolute;border:0;padding:0;margin:-1px;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
.sr-only-focusable{position:fixed;left:-9999px;width:1px;height:1px;overflow:hidden}
.sr-only-focusable:focus,.sr-only-focusable:active{position:static;clip:auto;width:auto;height:auto;margin:0;padding:0;overflow:visible}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:640px;margin:0 auto;min-height:100vh;line-height:1.5}
header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
header h1 span{color:var(--accent)}
.badge{font-size:11px;background:var(--accent);color:#0f172a;padding:4px 10px;border-radius:20px;font-weight:700}
.nav{padding:8px 16px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--border)}
.nav button{padding:8px 14px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:transparent;color:var(--muted);transition:all .15s}
.nav button.active{background:var(--accent);color:#0f172a}
main{padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.balance{font-size:32px;font-weight:800;letter-spacing:-1px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-card{text-align:center;padding:12px;border-radius:var(--radius);border:1px solid var(--border)}
.summary-card .label{font-size:11px;color:var(--muted)}
.summary-card .value{font-size:18px;font-weight:700;margin-top:2px}
.summary-card.in .value{color:var(--green)}.summary-card.out .value{color:var(--red)}
.quick-add{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-add input,textarea,select{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-family:inherit}
.quick-add input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
.quick-add textarea{grid-column:1/-1;resize:vertical;height:80px;font-size:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--accent);color:#0f172a}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:6px 12px;font-size:11px}
.search-bar{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;margin-bottom:12px}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select{flex:1;min-width:80px;padding:8px;font-size:12px}
.txn-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.txn-item:hover{background:rgba(255,255,255,.03)}
.txn-item .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.txn-item .icon.in{background:rgba(16,185,129,.15);color:var(--green)}
.txn-item .icon.out{background:rgba(239,68,68,.15);color:var(--red)}
.txn-item .info{flex:1;min-width:0}
.txn-item .info .title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.txn-item .info .sub{font-size:11px;color:var(--muted);margin-top:1px}
.txn-item .amount{font-weight:700;font-size:14px;text-align:right}
.txn-item .amount.in{color:var(--green)}.txn-item .amount.out{color:var(--red)}
.cat-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase}
.cat-Food{background:rgba(245,158,11,.15);color:#f59e0b}.cat-Transport{background:rgba(59,130,246,.15);color:#3b82f6}
.cat-Bills{background:rgba(239,68,68,.15);color:#ef4444}.cat-Shopping{background:rgba(168,85,247,.15);color:#a855f7}
.cat-Entertainment{background:rgba(236,72,153,.15);color:#ec4899}.cat-Health{background:rgba(34,197,94,.15);color:#22c55e}
.cat-Transfer{background:rgba(14,165,233,.15);color:#0ea5e9}.cat-Other{background:rgba(148,163,184,.15);color:#94a3b8}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.modal-body{position:relative;background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;animation:up .2s}
@keyframes up{from{transform:translateY(100%)}}.modal-body h2{font-size:16px;margin-bottom:12px}
.modal-body .actions{display:flex;gap:8px;margin-top:16px}
.chart-container{position:relative;width:100%;margin:12px 0}canvas{width:100%}
.empty{text-align:center;padding:32px;color:var(--muted)}.empty .icon{font-size:40px;margin-bottom:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1}.hidden{display:none!important}
</style>
</head>
<body>
<a href="#main-content" class="sr-only sr-only-focusable">Skip to content</a>
<header><h1>💰 <span>MoMo</span> Tracker</h1><span class="badge" id="txn-count" aria-live="polite">0</span></header>
<nav class="nav" id="nav-bar" role="navigation" aria-label="Main navigation">
  <button type="button" class="active" data-page="dashboard" aria-pressed="true">📊 Dashboard</button>
  <button type="button" data-page="add" aria-pressed="false">➕ Add</button>
  <button type="button" data-page="history" aria-pressed="false">📋 History</button>
  <button type="button" data-page="insights" aria-pressed="false">📈 Insights</button>
</nav>
<main id="main-content" role="main"></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
var state={page:'dashboard',txns:[],modal:null};
function load(){try{state.txns=JSON.parse(localStorage.getItem('momo_txns')||'[]')}catch(e){state.txns=[]};fetch('/api/sync').then(function(r){return r.json()}).then(function(d){if(d.txns&&d.txns.length>state.txns.length){state.txns=d.txns;saveLocal();render()}}).catch(function(){})}
function saveLocal(){localStorage.setItem('momo_txns',JSON.stringify(state.txns))}
function saveServer(){fetch('/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({txns:state.txns})}).catch(function(){})}
function save(){saveLocal();saveServer();render()}
function addTxn(t){t.id=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2,8);t.created_at=new Date().toISOString();t.currency=t.currency||'RWF';t.tags=t.tags||[];t.category=t.category||autoCat(t);state.txns.unshift(t);save()}
function updateTxn(id,u){var t=state.txns.find(function(x){return x.id===id});if(t){Object.assign(t,u);t.category=autoCat(t);save()}}
function deleteTxn(id){state.txns=state.txns.filter(function(x){return x.id!==id});save()}
function autoCat(t){
  var x=((t.description||'')+' '+(t.notes||'')+' '+(t.raw_message||'')).toLowerCase();
  if(/restaurant|food|eat|lunch|dinner|breakfast|grocer|market|canteen|cafe|coffee|rice|meal|pizza|burger|drink|juice/i.test(x))return'Food';
  if(/transport|taxi|moto|bus|fuel|gas|park|fare|ride|move|car|bike|garage|uber/i.test(x))return'Transport';
  if(/rent|bill|electric|water|internet|wifi|airtime|data|bundle|top.?up|canal|dstv|subscription|insurance/i.test(x))return'Bills';
  if(/shop|buy|cloth|shoe|watch|phone|amazon|jumia|mall|store|purchase|order|item/i.test(x))return'Shopping';
  if(/movie|game|netflix|spotify|show|concert|party|bar|club|beer|music|fun|ticket/i.test(x))return'Entertainment';
  if(/doctor|hospital|medic|pharma|clinic|health|dental|check.?up|prescrip|drug/i.test(x))return'Health';
  if(/transfer|send|sent|received|receive|momo|mtn|bank|mobile money|cash.?in|cash.?out|withdr/i.test(x))return'Transfer';
  return'Other';
}
function parseMessage(raw){
  if(!raw||!raw.trim())return null;
  var t=raw.trim(),r={type:'expense',amount:null,currency:'RWF',sender:null,receiver:null,date:new Date().toISOString(),source:'manual',description:null,raw_message:t};
  var m=t.match(/(\d[\d,]*)\s*(RWF|FRW|\$|USD|EUR)/i)||t.match(/RWF\s*(\d[\d,]*)/i)||t.match(/(\d[\d,]+)/);
  if(m)r.amount=parseInt(m[1].replace(/,/g,''));if(!r.amount){r.amount=0;r.parse_error='No amount found';return r}
  if(/RWF|FRW/i.test(t))r.currency='RWF';else if(/\$|USD/i.test(t))r.currency='USD';
  if(/receive|received|incoming|income|cash.?in|deposit|credit|wishyuwe|wakiriye|yishyuwe|payment into/i.test(t))r.type='income';
  else if(/sent|send|paid|pay|bought|purchased|transferred to|transfer to|cash.?out|expense|debit|withdr|wishyuye|kohereza|yishyuye|payment to/i.test(t))r.type='expense';
  var p=t.match(/(250\d{9}|07[8|2|3]\d{7})/);if(p)r.receiver=p[0].startsWith('0')?'25'+p[0]:p[0];
  if(/MoMo|mobile money|MTN|momo/i.test(t))r.source='MoMo';else if(/bank|BK|I&M|KCB|Equity|BPR|COGEBANQUE/i.test(t))r.source='Bank';else if(/airtel|tigo/i.test(t))r.source='Airtel Money';
  var d=t.match(/(\d{1,2}[/-]\d{1,2}[/-]\d{2,4})/);if(d)r.date=new Date(d[1].replace(/(\d{2})$/,'20$1')).toISOString();
  var desc=t.match(/(?:for|description|reason|purpose)[:\s]+(.+?)(?:\.|,|\n|$)/i);if(desc)r.description=desc[1].trim();else{var l=t.split(/[\n\r]+/).filter(Boolean);if(l.length>=1)r.description=l[0].slice(0,80)}
  r.category=autoCat(r);return r;
}
function fmtAmt(n){return n.toLocaleString()}
function fmtDate(iso){if(!iso)return'';var d=new Date(iso);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear().toString().slice(2)}
function render(){
  document.getElementById('txn-count').textContent=state.txns.length;
  document.querySelectorAll('#nav-bar button').forEach(function(b){b.classList.toggle('active',b.dataset.page===state.page);b.setAttribute('aria-pressed', b.dataset.page===state.page?'true':'false')});
  var m=document.getElementById('main-content');
  if(state.page==='dashboard')m.innerHTML=dashHTML();
  else if(state.page==='add')m.innerHTML=addHTML();
  else if(state.page==='history'){m.innerHTML=historyHTML();setTimeout(renderHistory,10)}
  else if(state.page==='insights'){m.innerHTML=insightsHTML();setTimeout(drawCharts,50)}
  renderModal();
}
function dashHTML(){
  var bal=state.txns.reduce(function(s,t){return t.type==='income'?s+t.amount:s-t.amount},0);
  var inc=state.txns.filter(function(t){return t.type==='income'}).reduce(function(s,t){return s+t.amount},0);
  var exp=state.txns.filter(function(t){return t.type!=='income'}).reduce(function(s,t){return s+t.amount},0);
  var un=state.txns.filter(function(t){return !t.notes}).length;
  return'<div class="card"><h3>Balance</h3><div class="balance">'+fmtAmt(bal)+' RWF</div><div style="color:var(--muted);font-size:12px">RWF</div></div>'+
    '<div class="summary-grid"><div class="summary-card in"><div class="label">📥 Money In</div><div class="value">'+fmtAmt(inc)+'</div></div><div class="summary-card out"><div class="label">📤 Money Out</div><div class="value">'+fmtAmt(exp)+'</div></div></div>'+
    '<div class="card" style="margin-top:12px"><h3>Quick Stats</h3><div style="display:flex;justify-content:space-between;font-size:13px"><span>Transactions</span><span>'+state.txns.length+'</span></div><div style="display:flex;justify-content:space-between;font-size:13px;margin-top:4px"><span>Without notes</span><span style="color:var(--red)">'+un+'</span></div></div>'+
    '<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary" onclick="navigate(\'add\')" style="flex:1">➕ Add Transaction</button><button class="btn btn-ghost" onclick="exportCSV()" style="flex:1">📊 Export CSV</button></div>';
}
function addHTML(){
  return '<div class="card"><h3>📋 Paste Message</h3><label class="sr-only" for="paste-box">Paste your MoMo SMS or bank message</label><textarea id="paste-box" placeholder="Paste your MoMo SMS or bank message here...&#10;&#10;Examples:&#10;You have sent 5000 RWF to Jean 250781234567&#10;Received 15000 RWF from MUKAMANA on 25/06/2026" style="height:140px;margin-bottom:8px"></textarea><button type="button" class="btn btn-primary" onclick="parsePaste()" style="width:100%">🔍 Parse & Save</button><div id="parse-preview" style="margin-top:12px"></div></div>'+
    '<div class="card"><h3>✍️ Manual Entry</h3><div class="quick-add"><label class="sr-only" for="man-amount">Amount</label><select id="man-type"><option value="expense">📤 Expense</option><option value="income">📥 Income</option></select><input type="number" id="man-amount" placeholder="Amount" inputmode="numeric"><input id="man-desc" placeholder="Description (e.g. paid rent)"><input id="man-notes" placeholder="Notes (optional)"><select id="man-cat"><option value="">Auto-detect</option><option>Food</option><option>Transport</option><option>Bills</option><option>Shopping</option><option>Entertainment</option><option>Health</option><option>Transfer</option><option>Other</option></select><button type="button" class="btn btn-primary" onclick="addManual()" style="grid-column:1/-1">Save Transaction</button></div></div>';
}
function historyHTML(){
  return '<label class="sr-only" for="search-box">Search transactions</label><input class="search-bar" id="search-box" placeholder="🔍 Search transactions..." oninput="renderHistory()"><div class="filter-row"><select id="fil-type" onchange="renderHistory()"><option value="All">All</option><option value="income">Income</option><option value="expense">Expense</option></select></div><div id="history-list"></div>';
}
function renderHistory(){
  var q=(document.getElementById('search-box')||{}).value||'';
  var f=(document.getElementById('fil-type')||{}).value||'All';
  var txns=state.txns;
  if(f!=='All')txns=txns.filter(function(t){return t.type===f});
  if(q)txns=txns.filter(function(t){return JSON.stringify(t).toLowerCase().indexOf(q.toLowerCase())>-1});
  var list=document.getElementById('history-list');if(!list)return;
  if(!txns.length){list.innerHTML='<div class="empty"><div class="icon">📭</div><p>No transactions found</p></div>';return}
  list.innerHTML=txns.map(function(t){
    var ic=t.type==='income'?'↓':'↑',cl=t.type==='income'?'in':'out';
    var desc=t.description||t.notes||(t.type==='income'?'Received':'Payment');
    return'<div class="txn-item" onclick="editTxn(\''+t.id+'\')"><div class="icon '+cl+'">'+ic+'</div><div class="info"><div class="title">'+desc+' <span class="cat-tag cat-'+t.category+'">'+t.category+'</span></div><div class="sub">'+fmtDate(t.date)+' · '+t.source+'</div></div><div class="amount '+cl+'">'+(t.type==='income'?'+':'-')+fmtAmt(t.amount)+'</div></div>';
  }).join('');
}
function insightsHTML(){
  return'<div class="card"><h3>📊 Spending by Category</h3><div class="chart-container"><canvas id="pie-chart"></canvas></div></div><div class="card"><h3>📈 Income vs Expenses</h3><div class="chart-container"><canvas id="bar-chart"></canvas></div></div><div class="card" id="top-cats-card"></div>';
}
function drawCharts(){drawPie();drawBar();topCats()}
function drawPie(){
  var c=document.getElementById('pie-chart');if(!c)return;var ctx=c.getContext('2d'),dpr=window.devicePixelRatio||1;
  var w=c.parentElement.offsetWidth-32,h=220;c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';ctx.scale(dpr,dpr);
  var cats={};state.txns.filter(function(t){return t.type!=='income'}).forEach(function(t){var k=t.category||'Other';cats[k]=(cats[k]||0)+t.amount});
  var entries=Object.entries(cats).sort(function(a,b){return b[1]-a[1]});
  if(!entries.length){ctx.fillStyle='#94a3b8';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('No data yet',w/2,h/2);return}
  var total=entries.reduce(function(s,e){return s+e[1]},0),colors=['#f59e0b','#3b82f6','#ef4444','#a855f7','#ec4899','#22c55e','#0ea5e9','#94a3b8'];
  var cx=w/2,cy=h/2,r=Math.min(cx,cy)-10,a=0;
  entries.forEach(function(e,i){var sl=e[1]/total*Math.PI*2;ctx.fillStyle=colors[i%colors.length];ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a,a+sl);ctx.closePath();ctx.fill();a+=sl});
  entries.forEach(function(e,i){var y=14+i*18;ctx.fillStyle=colors[i%colors.length];ctx.fillRect(w*0.55,y-8,10,10);ctx.fillStyle='#94a3b8';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText(e[0]+' ('+(e[1]/total*100).toFixed(0)+'%)',w*0.55+14,y)});
}
function drawBar(){
  var c=document.getElementById('bar-chart');if(!c)return;var ctx=c.getContext('2d'),dpr=window.devicePixelRatio||1;
  var w=c.parentElement.offsetWidth-32,h=200;c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';ctx.scale(dpr,dpr);
  var months={};state.txns.forEach(function(t){var m=t.date?t.date.slice(0,7):'unknown';if(!months[m])months[m]={income:0,expense:0};if(t.type==='income')months[m].income+=t.amount;else months[m].expense+=t.amount});
  var keys=Object.keys(months).sort().slice(-6);
  if(!keys.length){ctx.fillStyle='#94a3b8';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('No monthly data yet',w/2,h/2);return}
  var mx=Math.max.apply(null,keys.map(function(k){return Math.max(months[k].income,months[k].expense)}))||1;
  var bw=Math.min(14,(w-40)/keys.length/2.5),left=40;ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='center';
  keys.forEach(function(k,i){var x=left+i*(w-left)/keys.length;var ih=months[k].income/mx*(h-40);ctx.fillStyle='#10b981';ctx.fillRect(x-bw,h-ih-20,bw,ih);var eh=months[k].expense/mx*(h-40);ctx.fillStyle='#ef4444';ctx.fillRect(x,h-eh-20,bw,eh);ctx.fillStyle='#94a3b8';ctx.fillText(k.slice(5),x,h-4)});
}
function topCats(){
  var cats={};state.txns.filter(function(t){return t.type!=='income'}).forEach(function(t){var k=t.category||'Other';cats[k]=(cats[k]||0)+t.amount});
  var entries=Object.entries(cats).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var el=document.getElementById('top-cats-card');if(!el)return;
  if(!entries.length){el.innerHTML='<h3>🏆 Top Categories</h3><div class="empty"><p>No spending data</p></div>';return}
  el.innerHTML='<h3>🏆 Top Spending Categories</h3>'+entries.map(function(e,i){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span>#'+(i+1)+' <span class="cat-tag cat-'+e[0]+'">'+e[0]+'</span></span><span style="font-weight:700">'+fmtAmt(e[1])+' RWF</span></div>'}).join('');
}
function navigate(p){state.page=p;state.modal=null;render()}
function parsePaste(){
  var raw=document.getElementById('paste-box').value,txn=parseMessage(raw),pv=document.getElementById('parse-preview');
  if(txn.parse_error){pv.innerHTML='<div style="color:var(--red);font-size:13px">❌ '+txn.parse_error+'</div>';return}
  txn.raw_message=raw;addTxn(txn);document.getElementById('paste-box').value='';
  pv.innerHTML='<div style="color:var(--green);font-size:13px">✅ Saved: '+(txn.type==='income'?'+':'-')+fmtAmt(txn.amount)+' RWF · '+txn.category+'</div>';
  toast('Transaction saved!');setTimeout(function(){pv.innerHTML=''},3000);
}
function addManual(){
  var txn={type:document.getElementById('man-type').value,amount:parseInt(document.getElementById('man-amount').value)||0,description:document.getElementById('man-desc').value.trim(),notes:document.getElementById('man-notes').value.trim(),source:'manual',date:new Date().toISOString(),currency:'RWF',sender:null,receiver:null};
  if(!txn.amount){toast('Enter an amount');return}
  txn.category=document.getElementById('man-cat').value||autoCat(txn);addTxn(txn);
  document.getElementById('man-amount').value='';document.getElementById('man-desc').value='';document.getElementById('man-notes').value='';
  toast('Saved!');setTimeout(function(){navigate('dashboard')},800);
}
function editTxn(id){
  var t=state.txns.find(function(x){return x.id===id});if(!t)return;
  state.modal={title:'Edit Transaction',body:'<div class="quick-add"><select id="ed-type">'+['income','expense'].map(function(v){return'<option value="'+v+'"'+(t.type===v?' selected':'')+'>'+(v==='income'?'📥 Income':'📤 Expense')+'</option>'}).join('')+'</select><input type="number" id="ed-amount" value="'+t.amount+'"><input id="ed-desc" value="'+(t.description||'')+'" placeholder="Description"><input id="ed-notes" value="'+(t.notes||'')+'" placeholder="Notes"><select id="ed-cat">'+['Food','Transport','Bills','Shopping','Entertainment','Health','Transfer','Other'].map(function(c){return'<option value="'+c+'"'+(t.category===c?' selected':'')+'>'+c+'</option>'}).join('')+'</select></div><div class="actions"><button class="btn btn-danger btn-sm" onclick="deleteTxn(\''+id+'\');closeModal()">🗑 Delete</button><button class="btn btn-primary" onclick="saveEdit(\''+id+'\');closeModal()">Save</button></div>'};
  render();renderModal();
}
function saveEdit(id){updateTxn(id,{type:document.getElementById('ed-type').value,amount:parseInt(document.getElementById('ed-amount').value)||0,description:document.getElementById('ed-desc').value.trim(),notes:document.getElementById('ed-notes').value.trim(),category:document.getElementById('ed-cat').value})}
function closeModal(){state.modal=null;render()}
function renderModal(){
  var el=document.getElementById('modal-container');
  if(!state.modal){if(el)el.remove();return}
  if(!el){el=document.createElement('div');el.id='modal-container';document.body.appendChild(el)}
  el.innerHTML='<div class="modal"><div class="modal-bg" onclick="closeModal()"></div><div class="modal-body"><h2>'+state.modal.title+'</h2>'+state.modal.body+'</div></div>';
  el.querySelector('.modal-body').addEventListener('click',function(e){e.stopPropagation()});
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function exportCSV(){
  var csv='Type,Amount,Currency,Category,Description,Notes,Source,Date\n';
  state.txns.forEach(function(t){csv+=[t.type,t.amount,t.currency,t.category,(t.description||'').replace(/,/g,' '),(t.notes||'').replace(/,/g,' '),t.source,t.date].join(',')+'\n'});
  var b=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='momo-transactions.csv';a.click();toast('CSV exported!');
}
document.getElementById('nav-bar').addEventListener('click',function(e){if(e.target.tagName==='BUTTON')navigate(e.target.dataset.page)});
if('serviceWorker' in navigator)navigator.serviceWorker.register('/static/sw.js');
load();render();
</script>
